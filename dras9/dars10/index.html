<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form taglari</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- div - ichiga kod bloklarini olgan bo'sh karobka -->
    <div class="mavzu">Assalom aleykum space akkount ro'yhatdan o'ting</div>

    <form class="register">
        <div>
            <label for="">Ismingiz: </label>
            <input type="text" placeholder="Ismingizni kiriting">
        </div>
        <div>
            <label for="">Familiya: </label>
            <input type="text" placeholder="Familiyangizni kiriting">
        </div>
        <div>
            <label for="">ID raqam: </label>
            <input type="number" placeholder="ID raqamingizni kiriting">
        </div>
        <div>
            <label for="">Loginingiz: </label>
            <input type="text" placeholder="Loginingizni kiriting">
        </div>
        <div>
            <label for="">Emailingiz: </label>
            <input type="text" placeholder="Email kiriting">
        </div>

        <button class="btn">Jo'natish</button>
    </form>
    
</body>
</html>
